version: 2

project_name: gentle-qa

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/gentle-qa
    binary: gentle-qa
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: EduardoVeraE
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    name: gentle-qa
    homepage: "https://github.com/EduardoVeraE/Gentle-QA"
    description: "Gentle-QA — One command. Any test. Any framework."
    license: "MIT"
    commit_msg_template: "chore: update gentle-qa formula to {{ .Tag }}"

scoops:
  - repository:
      owner: EduardoVeraE
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: gentle-qa
    homepage: "https://github.com/EduardoVeraE/Gentle-QA"
    description: "Gentle-QA — One command. Any test. Any framework."
    license: MIT
    commit_msg_template: "chore: update gentle-qa to {{ .Tag }}"
